<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            background: #f0f0f0;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 18px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            background: #e0e0e0;
            color: #333;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        /* Filter Styles */
        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .filters h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
            font-size: 0.9rem;
        }

        .filter-group input, 
        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-buttons .btn {
            padding: 10px 20px;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            font-weight: 600;
            white-space: nowrap;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .status-present {
            background: #d4edda;
            color: #155724;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status-absent {
            background: #f8d7da;
            color: #721c24;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .status-late {
            background: #fff3cd;
            color: #856404;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Search Box */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Students List */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .student-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }

        .student-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .student-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .student-card p {
            margin: 5px 0;
            color: #555;
            font-size: 0.95rem;
        }

        .student-card .delete-btn {
            margin-top: 15px;
        }

        /* Import/Export Section */
        .import-export {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Message Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }

        .toast.info {
            background: #17a2b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }

            .filter-row {
                flex-direction: column;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            th, td {
                padding: 10px;
                font-size: 0.9rem;
            }
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
        }

        .stat-card.green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .stat-card.red {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .stat-card.yellow {
            background: linear-gradient(135deg, #f2994a 0%, #f2c94c 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Student Attendance Management System</h1>
            <p>Track student attendance with RFID technology</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('attendance')">📋 Attendance List</button>
            <button class="tab-btn" onclick="showTab('students')">👥 Registered Students</button>
            <button class="tab-btn" onclick="showTab('register')">➕ Register Student</button>
        </div>

        <!-- Attendance Tab -->
        <div id="attendance" class="tab-content active">
            <div class="filters">
                <h3>🔍 Filter Attendance</h3>
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Date</label>
                        <input type="date" id="filterDate">
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="filterStatus">
                            <option value="">All Status</option>
                            <option value="present">Present</option>
                            <option value="absent">Absent</option>
                            <option value="late">Late</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Search by Name/Admission No.</label>
                        <input type="text" id="filterSearch" placeholder="Enter name or admission number">
                    </div>
                    <div class="filter-group">
                        <label>RFID Card Number</label>
                        <input type="text" id="filterRfid" placeholder="Enter RFID card number">
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Time In (From)</label>
                        <input type="time" id="filterTimeInStart">
                    </div>
                    <div class="filter-group">
                        <label>Time In (To)</label>
                        <input type="time" id="filterTimeInEnd">
                    </div>
                    <div class="filter-group">
                        <label>Time Out (From)</label>
                        <input type="time" id="filterTimeOutStart">
                    </div>
                    <div class="filter-group">
                        <label>Time Out (To)</label>
                        <input type="time" id="filterTimeOutEnd">
                    </div>
                </div>
                <div class="filter-buttons">
                    <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
                    <button class="btn btn-secondary" onclick="clearFilters()">Clear Filters</button>
                    <button class="btn btn-success" onclick="exportAttendance()">📥 Export to CSV</button>
                    <div class="file-input-wrapper">
                        <button class="btn btn-secondary">📤 Import CSV</button>
                        <input type="file" id="importFile" accept=".csv" onchange="importAttendance(this)">
                    </div>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="globalSearch" placeholder="🔍 Search attendance by name, admission number, or RFID..." onkeyup="searchAttendance()">
            </div>

            <div class="stats-container" id="statsContainer">
                <div class="stat-card">
                    <h3 id="totalCount">0</h3>
                    <p>Total Records</p>
                </div>
                <div class="stat-card green">
                    <h3 id="presentCount">0</h3>
                    <p>Present</p>
                </div>
                <div class="stat-card red">
                    <h3 id="absentCount">0</h3>
                    <p>Absent</p>
                </div>
                <div class="stat-card yellow">
                    <h3 id="lateCount">0</h3>
                    <p>Late</p>
                </div>
            </div>

            <div class="table-container">
                <table id="attendanceTable">
                    <thead>
                        <tr>
                            <th>Admission No.</th>
                            <th>Name</th>
                            <th>RFID Card No.</th>
                            <th>Date</th>
                            <th>Time In</th>
                            <th>Time Out</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceBody">
                        <tr>
                            <td colspan="8">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Students Tab -->
        <div id="students" class="tab-content">
            <div class="search-box">
                <input type="text" id="studentSearch" placeholder="🔍 Search students by name, admission number, or RFID..." onkeyup="searchStudents()">
            </div>

            <div class="import-export">
                <button class="btn btn-success" onclick="exportStudents()">📥 Export Students</button>
                <div class="file-input-wrapper">
                    <button class="btn btn-secondary">📤 Import Students</button>
                    <input type="file" id="importStudentsFile" accept=".csv" onchange="importStudents(this)">
                </div>
            </div>

            <div class="students-grid" id="studentsGrid">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Register Tab -->
        <div id="register" class="tab-content">
            <h2 style="margin-bottom: 25px; color: #333;">Register New Student</h2>
            <form id="registerForm" onsubmit="registerStudent(event)">
                <div class="form-group">
                    <label for="admissionNumber">Admission Number *</label>
                    <input type="text" id="admissionNumber" required placeholder="Enter admission number">
                </div>
                <div class="form-group">
                    <label for="studentName">Student Name *</label>
                    <input type="text" id="studentName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="rfidCard">RFID Card Number *</label>
                    <input type="text" id="rfidCard" required placeholder="Enter RFID card number">
                </div>
                <div class="form-group">
                    <label for="parentPhone">Parent's Phone Number *</label>
                    <input type="tel" id="parentPhone" required placeholder="Enter parent's phone number">
                </div>
                <button type="submit" class="btn btn-primary">Register Student</button>
                <button type="reset" class="btn btn-secondary">Clear Form</button>
            </form>
        </div>
    </div>

    <script>
        // API Base URL
        const API_URL = '';

        // Tab Navigation
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');

            if (tabId === 'attendance') {
                loadAttendance();
            } else if (tabId === 'students') {
                loadStudents();
            }
        }

        // Toast Notifications
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // ==================== ATTENDANCE FUNCTIONS ====================

        let currentAttendance = [];

        async function loadAttendance(filters = {}) {
            try {
                const params = new URLSearchParams(filters);
                const response = await fetch(`${API_URL}/api/attendance?${params}`);
                const data = await response.json();
                
                currentAttendance = data;
                renderAttendanceTable(data);
                updateStats(data);
            } catch (error) {
                console.error('Error loading attendance:', error);
                showToast('Error loading attendance data', 'error');
            }
        }

        function renderAttendanceTable(attendance) {
            const tbody = document.getElementById('attendanceBody');
            
            if (attendance.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 30px; color: #666;">No attendance records found</td></tr>';
                return;
            }

            tbody.innerHTML = attendance.map(record => `
                <tr>
                    <td>${record.admission_number}</td>
                    <td>${record.name}</td>
                    <td>${record.rfid_card_number}</td>
                    <td>${record.date}</td>
                    <td>${record.time_in || '-'}</td>
                    <td>${record.time_out || '-'}</td>
                    <td><span class="status-${record.status}">${record.status.toUpperCase()}</span></td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteAttendance('${record.admission_number}', '${record.date}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(attendance) {
            document.getElementById('totalCount').textContent = attendance.length;
            document.getElementById('presentCount').textContent = attendance.filter(r => r.status === 'present').length;
            document.getElementById('absentCount').textContent = attendance.filter(r => r.status === 'absent').length;
            document.getElementById('lateCount').textContent = attendance.filter(r => r.status === 'late').length;
        }

        function applyFilters() {
            const filters = {};
            
            if (document.getElementById('filterDate').value) {
                filters.date = document.getElementById('filterDate').value;
            }
            if (document.getElementById('filterStatus').value) {
                filters.status = document.getElementById('filterStatus').value;
            }
            if (document.getElementById('filterSearch').value) {
                filters.search = document.getElementById('filterSearch').value;
            }
            if (document.getElementById('filterRfid').value) {
                filters.rfid = document.getElementById('filterRfid').value;
            }
            if (document.getElementById('filterTimeInStart').value) {
                filters.time_in_start = document.getElementById('filterTimeInStart').value;
            }
            if (document.getElementById('filterTimeInEnd').value) {
                filters.time_in_end = document.getElementById('filterTimeInEnd').value;
            }
            if (document.getElementById('filterTimeOutStart').value) {
                filters.time_out_start = document.getElementById('filterTimeOutStart').value;
            }
            if (document.getElementById('filterTimeOutEnd').value) {
                filters.time_out_end = document.getElementById('filterTimeOutEnd').value;
            }

            loadAttendance(filters);
            showToast('Filters applied', 'success');
        }

        function clearFilters() {
            document.getElementById('filterDate').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterSearch').value = '';
            document.getElementById('filterRfid').value = '';
            document.getElementById('filterTimeInStart').value = '';
            document.getElementById('filterTimeInEnd').value = '';
            document.getElementById('filterTimeOutStart').value = '';
            document.getElementById('filterTimeOutEnd').value = '';
            
            loadAttendance();
            showToast('Filters cleared', 'info');
        }

        function searchAttendance() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            
            if (!query) {
                renderAttendanceTable(currentAttendance);
                return;
            }

            const filtered = currentAttendance.filter(record => 
                record.name.toLowerCase().includes(query) ||
                record.admission_number.toLowerCase().includes(query) ||
                record.rfid_card_number.includes(query)
            );
            
            renderAttendanceTable(filtered);
        }

        async function deleteAttendance(admissionNumber, date) {
            if (!confirm('Are you sure you want to delete this attendance record?')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/attendance/${admissionNumber}/${date}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Attendance record deleted', 'success');
                    loadAttendance();
                } else {
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Error deleting attendance record', 'error');
            }
        }

        async function exportAttendance() {
            try {
                const response = await fetch(`${API_URL}/api/attendance/export`);
                const blob = await response.blob();
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `attendance_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                
                showToast('Attendance exported successfully', 'success');
            } catch (error) {
                showToast('Error exporting attendance', 'error');
            }
        }

        async function importAttendance(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const response = await fetch(`${API_URL}/api/attendance/import`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ csvData: e.target.result })
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        showToast(data.message, 'success');
                        loadAttendance();
                    } else {
                        showToast(data.error, 'error');
                    }
                } catch (error) {
                    showToast('Error importing attendance', 'error');
                }
            };
            reader.readAsText(file);
            input.value = ''; // Reset file input
        }

        // ==================== STUDENTS FUNCTIONS ====================

        async function loadStudents() {
            try {
                const response = await fetch(`${API_URL}/api/students`);
                const students = await response.json();
                renderStudents(students);
            } catch (error) {
                console.error('Error loading students:', error);
                showToast('Error loading students data', 'error');
            }
        }

        function renderStudents(students) {
            const grid = document.getElementById('studentsGrid');
            
            if (students.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666;">No students registered yet</p>';
                return;
            }

            grid.innerHTML = students.map(student => `
                <div class="student-card">
                    <h4>${student.name}</h4>
                    <p><strong>Admission No.:</strong> ${student.admission_number}</p>
                    <p><strong>RFID Card:</strong> ${student.rfid_card_number}</p>
                    <p><strong>Parent's Phone:</strong> ${student.parent_phone}</p>
                    <button class="btn btn-danger delete-btn" onclick="deleteStudent('${student.admission_number}')">Delete</button>
                </div>
            `).join('');
        }

        function searchStudents() {
            const query = document.getElementById('studentSearch').value.toLowerCase();
            
            fetch(`${API_URL}/api/students`)
                .then(res => res.json())
                .then(students => {
                    const filtered = students.filter(student => 
                        student.name.toLowerCase().includes(query) ||
                        student.admission_number.toLowerCase().includes(query) ||
                        student.rfid_card_number.includes(query)
                    );
                    renderStudents(filtered);
                });
        }

        async function registerStudent(event) {
            event.preventDefault();

            const studentData = {
                admission_number: document.getElementById('admissionNumber').value,
                name: document.getElementById('studentName').value,
                rfid_card_number: document.getElementById('rfidCard').value,
                parent_phone: document.getElementById('parentPhone').value
            };

            try {
                const response = await fetch(`${API_URL}/api/students`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(studentData)
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Student registered successfully!', 'success');
                    document.getElementById('registerForm').reset();
                    setTimeout(() => showTab('students'), 1000);
                } else {
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Error registering student', 'error');
            }
        }

        async function deleteStudent(admissionNumber) {
            if (!confirm('Are you sure you want to delete this student? This will not delete their attendance records.')) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/students/${admissionNumber}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Student deleted successfully', 'success');
                    loadStudents();
                } else {
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Error deleting student', 'error');
            }
        }

        async function exportStudents() {
            try {
                const response = await fetch(`${API_URL}/api/students`);
                const students = await response.json();

                const csvContent = 'admission_number,rfid_card_number,parent_phone,name\n' + 
                    students.map(s => `${s.admission_number},${s.rfid_card_number},${s.parent_phone},${s.name}`).join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `students_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                
                showToast('Students exported successfully', 'success');
            } catch (error) {
                showToast('Error exporting students', 'error');
            }
        }

        async function importStudents(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const lines = e.target.result.split('\n').filter(line => line.trim());
                const headers = lines[0].split(',');
                
                let imported = 0;
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',');
                    if (values.length >= 4) {
                        const studentData = {
                            admission_number: values[0].trim(),
                            rfid_card_number: values[1].trim(),
                            parent_phone: values[2].trim(),
                            name: values[3].trim()
                        };

                        try {
                            await fetch(`${API_URL}/api/students`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(studentData)
                            });
                            imported++;
                        } catch (error) {
                            console.error('Error importing student:', error);
                        }
                    }
                }
                
                showToast(`Imported ${imported} students successfully`, 'success');
                loadStudents();
            };
            reader.readAsText(file);
            input.value = '';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadAttendance();
        });
    </script>
</body>
</html>
